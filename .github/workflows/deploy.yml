name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 1 * * 1-5'   # 월~금 오전 10시 KST (UTC+9)
  workflow_dispatch:           # GitHub 웹에서 수동 실행 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      - name: 최신 주가 · 환율 조회 (Yahoo Finance)
        run: node scripts/fetch-prices.mjs
        continue-on-error: true   # 조회 실패해도 빌드 계속

      - name: 빌드
        run: npm run build
        env:
          VITE_REPO_BASE: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - id: deployment
        uses: actions/deploy-pages@v4
